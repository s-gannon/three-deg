<!DOCTYPE html>
<html>
<head>
	<title>Interactive Directed Graph with D3.js</title>
	<script src="https://d3js.org/d3.v7.min.js"></script>
	<style>
		body, html {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
		}
		svg {
			display: block;
			margin: auto;
		}
		.link {
			fill: none;
			stroke: #aaa;
			stroke-width: 2px;
		}
		.node {
			fill: #66ccff;
			cursor: pointer;
		}
		.node text {
			stroke: #222;
			font: 14px sans-serif;
		}
	</style>
</head>
<body>
	<svg></svg>

	<script>
		// Function to set SVG dimensions based on window size
		function setSVGDimensions() {
		var svg = d3.select("svg");
		var width = window.innerWidth;
		var height = window.innerHeight;
		svg.attr("width", width).attr("height", height);
		svg.attr("viewBox", `${-width / 2} ${-height / 2} ${width} ${height}`);
		}

		// Call the function initially
		setSVGDimensions();

		// Call the function whenever the window is resized
		window.addEventListener("resize", setSVGDimensions);

		// Sample data representing nodes and links
		var nodes = [
			{id: 1, name: "Spencer Gannon"},
			{id: 2, name: "Jack Waechter"},
			{id: 3, name: "Jim Waechter"},
			{id: 4, name: "Nicholas Rosasco"},
			{id: 5, name: "Martin Buinicki"},
			{id: 6, name: "Dustin Ritchea"},
			{id: 7, name: "Beagle Johnson"}
		];

		var links = [
			{source: 1, target: 2},
			{source: 1, target: 3},
			{source: 1, target: 4},
			{source: 1, target: 5},
			{source: 2, target: 3},
			{source: 4, target: 5},
			{source: 4, target: 7},
			{source: 5, target: 6},
			{source: 5, target: 7}
		];

		// Create the force simulation
		var simulation = d3.forceSimulation(nodes)
			.force("link", d3.forceLink(links).id(d => d.id))
			.force("charge", d3.forceManyBody().strength(-2000))
			.force("center", d3.forceCenter(0, 0)); // Centering the force simulation at (0, 0)

		// Create the links
		var link = d3.select("svg").selectAll(".link")
			.data(links)
			.enter().append("line")
			.attr("class", "link");

		// Create the nodes
		var node = d3.select("svg").selectAll(".node")
			.data(nodes)
			.enter().append("g")
			.attr("class", "node")
			.call(d3.drag() // Add drag behavior
				.on("start", dragstarted)
				.on("drag", dragged)
				.on("end", dragended))
			.on("click", clicked); // Add click event listener to nodes

		node.append("circle")
			.attr("r", 20)
			.attr("fill", "lightblue");

		node.append("text")
			.attr("dx", -40)
			.attr("dy", ".35em")
			.text(d => d.name);

		// Drag functions
		function dragstarted(event, d) {
			if (!event.active) simulation.alphaTarget(0.3).restart();
			d.fx = d.x;
			d.fy = d.y;
		}

		function dragged(event, d) {
			d.fx = event.x;
			d.fy = event.y;
		}

		function dragended(event, d) {
			if (!event.active) simulation.alphaTarget(0);
			d.fx = null;
			d.fy = null;
		}

		// Click event handler for nodes
		function clicked(event, d) {
			// You can add your custom actions here
		}

		// Update positions of nodes and links
		simulation.on("tick", () => {
			link
				.attr("x1", d => d.source.x)
				.attr("y1", d => d.source.y)
				.attr("x2", d => d.target.x)
				.attr("y2", d => d.target.y);
			node
				.attr("transform", d => `translate(${d.x},${d.y})`);
		});
	</script>
</body>
</html>
